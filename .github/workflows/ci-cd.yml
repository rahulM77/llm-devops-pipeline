name: LLMOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic requests pytest httpx ruff

      - name: Lint with Ruff
        run: |
          cd llm-devops-pipeline
          ruff check app/ --ignore E501,F401,F811

      - name: Run tests
        run: |
          cd llm-devops-pipeline
          pytest tests/ -v --tb=short --ignore=tests/test_api.py

  validate-prompts:
    name: Validate Prompt Versions
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate prompts
        run: |
          pip install fastapi pydantic requests
          cd llm-devops-pipeline
          python pipeline/validate_prompts.py

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          cd llm-devops-pipeline
          docker build -f docker/Dockerfile -t llmops-api:test .
          echo "Docker build successful"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Simulate deployment
        run: |
          echo "All checks passed!"
          echo "Deploying to staging environment..."
          echo "Deployment complete."